<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Panel Token - SDN MARGANTOKO 2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3a5a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 350px; text-align: center; }
        h2 { color: #1a3a5a; margin-bottom: 20px; font-size: 1.2rem; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #777; font-size: 0.8rem; text-transform: uppercase; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 4px solid #eee; box-sizing: border-box; font-size: 4rem; text-align: center; font-weight: 900; color: #1a3a5a; text-transform: uppercase; }
        input:focus { outline: none; border-color: #1a3a5a; }
        .btn { background: #1a3a5a; color: white; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: 800; border-radius: 12px; margin-top: 20px; font-size: 1.2rem; }
        .status-msg { color: #27ae60; font-size: 0.9rem; margin-top: 15px; font-weight: 600; display: none; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2>CONTROL TOKEN</h2>
        <label>MASUKKAN TOKEN</label>
        <input type="text" id="in-token" maxlength="6" placeholder="------" autofocus onkeyup="if(event.keyCode === 13) sendToken()">
        <button class="btn" onclick="sendToken()">UPDATE LAYAR</button>
        <div id="status" class="status-msg">✓ TOKEN DIPERBARUI</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQLmdP3Ld9Rwp05bcK-1vPKFWYny6z_9s",
            authDomain: "tka-margantoko.firebaseapp.com",
            databaseURL: "https://tka-margantoko-default-rtdb.firebaseio.com",
            projectId: "tka-margantoko",
            storageBucket: "tka-margantoko.firebasestorage.app",
            messagingSenderId: "347222016995",
            appId: "1:347222016995:web:93b390342b474d0c7756d6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('tka_token');

        function sendToken() {
            const tokenVal = document.getElementById('in-token').value.trim().toUpperCase() || "------";
            db.set(tokenVal).then(() => {
                const status = document.getElementById('status');
                status.style.display = 'block';
                setTimeout(() => { status.style.display = 'none'; }, 1000);
            }).catch((error) => {
                alert("Gagal update: " + error.message);
            });
        }
    </script>
</body>
</html>
