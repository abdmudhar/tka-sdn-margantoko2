<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISPLAY TKA - SDN MARGANTOKO 2</title>
    <style>
        :root {
            --primary: #1a3a5a; 
            --accent: #f1c40f; 
            --bg-light: #f0f4f8;
            --text-dark: #2c3e50; 
            --white: #ffffff; 
            --muted: #bdc3c7;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg-light); 
            overflow: hidden; 
            color: var(--text-dark); 
        }
        
        .display-area {
            width: 100vw; 
            height: 100vh;
            /* Penyesuaian: Opasitas gradasi diturunkan dari 0.3 ke 0.1 agar background asli lebih jelas */
            background: linear-gradient(rgba(255, 255, 255, 0.1), rgba(219, 234, 254, 0.15)), 
                        url('background-tka.jpg'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            text-align: center;
            padding-top: 20px;
        }

        /* HEADER BAR: Tanggal - Logo - Jam */
        .top-info { 
            width: 96%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            z-index: 10;
        }

        .date-container { 
            background: rgba(255, 255, 255, 0.9); /* Sedikit transparan agar menyatu dengan bg */
            padding: 15px 30px; 
            border-radius: 15px; 
            border-left: 10px solid var(--accent); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            text-align: left;
            min-width: 200px;
        }
        
        #out-day { font-size: 2.5rem; font-weight: 900; color: var(--primary); display: block; line-height: 1; }
        #out-date { font-size: 1.3rem; font-weight: 700; color: #444; }

        .logo-box { flex: 1; display: flex; justify-content: center; }
        .school-logo { 
            height: 180px; 
            width: auto; 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4)); 
            animation: fadeInDown 1s ease-out;
        }

        .clock { 
            font-size: 4.5rem; 
            font-weight: 800; 
            color: var(--primary); 
            font-family: 'monospace'; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 10px 40px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            min-width: 200px;
        }

        /* INFO UJIAN ATAS */
        .location-tag { 
            font-size: 3.2rem; 
            color: var(--white); 
            background: var(--primary); 
            padding: 10px 80px; 
            border-radius: 100px; 
            margin-bottom: 10px; 
            font-weight: 900; 
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 { 
            font-size: 4.2rem; 
            margin: 5px 0; 
            text-transform: uppercase; 
            color: var(--primary); 
            font-weight: 900; 
            text-shadow: 2px 2px 5px rgba(255,255,255,1);
        }

        h2 { font-size: 2.5rem; color: #333; margin: 0 0 30px 0; font-weight: 800; }

        /* TOKEN UJIAN */
        .token-wrapper { position: relative; animation: pulse 2s infinite ease-in-out; }
        .token-label {
            position: absolute;
            top: -25px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 8px 60px;
            font-weight: 900; font-size: 2.2rem; border-radius: 12px;
            z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .token-container {
            padding: 20px 100px; border: 18px solid var(--primary); 
            border-radius: 60px; background: white; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        #display-token { 
            font-size: 11rem; font-weight: 900; margin: 0; 
            letter-spacing: 25px; margin-right: -25px; 
            font-family: 'Courier New', monospace; color: var(--primary); 
        }

        /* MARQUEE */
        .marquee-container { position: absolute; bottom: 0; width: 100%; background: var(--primary); padding: 25px 0; }
        .marquee-content span { font-size: 2.2rem; color: var(--white); padding: 0 80px; font-weight: 700; }
        .label-peserta { color: var(--accent); margin-right: 5px; }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 30s linear infinite; }
    </style>
</head>
<body>

    <div class="display-area">
        <div class="top-info">
            <div class="date-container">
                <span id="out-day">---</span>
                <span id="out-date">---</span>
            </div>
            
            <div class="logo-box">
                <img src="logo.png" alt="Logo Sekolah" class="school-logo">
            </div>

            <div class="clock" id="clock">00:00:00</div>
        </div>
        
        <div class="location-tag">TUK : UPTD SDN MARGANTOKO 2</div>

        <h1>TES KEMAMPUAN AKADEMIK (TKA)</h1>
        <h2>TAHUN PELAJARAN 2025/2026</h2>

        <div class="token-wrapper">
            <div class="token-label">TOKEN UJIAN</div>
            <div class="token-container">
                <p id="display-token">------</p>
            </div>
        </div>

        <div class="marquee-container">
            <div class="marquee-content">
                <span style="color: var(--accent)">SELAMAT DATANG PESERTA UJIAN</span>
                <span><b class="label-peserta">PESERTA:</b> UPTD SDN MARGANTOKO 1</span>
                <span><b class="label-peserta">PESERTA:</b> UPTD SDN MARGANTOKO 2</span>
                <span><b class="label-peserta">PESERTA:</b> UPTD SDN ASEMNONGGAL 1</span>
                <span><b class="label-peserta">PESERTA:</b> UPTD SDN ASEMNONGGAL 2</span>
            </div>
        </div>
    </div>

    <script>
        function updateToken() {
            const token = localStorage.getItem('tka_shared_token') || "------";
            const displayToken = document.getElementById('display-token');
            displayToken.innerText = token;
            displayToken.style.color = (token === "------") ? "var(--muted)" : "var(--primary)";
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'tka_shared_token' || e.key === 'tka_trigger') updateToken();
        });

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false }).replace(/\./g, ':');
            document.getElementById('out-day').innerText = now.toLocaleDateString('id-ID', { weekday: 'long' });
            document.getElementById('out-date').innerText = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
        }

        window.onload = () => {
            updateToken();
            setInterval(updateTime, 1000);
            updateTime();
        };
    </script>
</body>
</html>
